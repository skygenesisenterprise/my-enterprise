services:
  company-website:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/company-website:latest
    container_name: company-website
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "8080"
      - "5432"
    environment:
      NODE_ENV: development
      ENVIRONMENT: development
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: aether
      DB_NAME: etheria_account
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DATABASE_URL: postgresql://aether:${DB_PASSWORD:-password}@localhost:5432/etheria_account
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-in-production}
      SERVER_PORT: 8080
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_ENVIRONMENT: development
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      GIN_MODE: debug
      USE_EMBEDDED_DB: "true"
    volumes:
      - ./server:/app/server
      - ./.air.toml:/app/.air.toml
      - ./app:/app/app:Delegated
      - ./scripts:/app/scripts
      - /app/app/node_modules
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    entrypoint: ["/entrypoint.sh"]

volumes:
  postgres_data:
